version: 2
updates:

  # ── GitHub Actions ────────────────────────────────────────────────────────
  # Keep workflow action versions current (security patches, bug fixes)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"

  # ── Swift Package Manager ────────────────────────────────────────────────
  # Track Sparkle, ZIPFoundation, and other SPM deps for the main app
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
    ignore:
      # ZIPFoundation is pinned to the 'development' branch (not a tag).
      # This must be manually migrated to a stable release first.
      # See: https://github.com/weichsel/ZIPFoundation/releases
      - dependency-name: "ZIPFoundation"
        versions: ["*"]

  # npm (SPIRV-Tools) is intentionally excluded.
  # OpenEmu-Shaders/3rdparty/SPIRV/3rdparty/SPIRV-Tools/tools/sva contains
  # a 2019-era yarn.lock for dev-only shader validator tooling. These packages
  # are never executed at runtime and are not shipped in the app binary.
  # All Dependabot alerts for this path have been dismissed as 'not_used'.
